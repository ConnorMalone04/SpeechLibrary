<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title th:text="${speech.title}">Speech</title>
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <span sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin}">Admin Dashboard</a>
    </span>

    <span sec:authorize="isAnonymous()">
        <a th:href="@{/login}">Login</a>
    </span>

    <span sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
    </span>
</div>

<div class="page">
    <div class="container card">

        <h1 th:text="${speech.title}" class="page-title"></h1>

        <h3>
            By <span th:text="${speech.person?.name ?: 'Unknown'}"></span>
        </h3>

        <p>
            <strong>Topics:</strong>
            <span th:if="${#sets.isEmpty(speech.topics)}">—</span>
            <span th:unless="${#sets.isEmpty(speech.topics)}"
                  th:each="topic, iterStat : ${speech.topics}">
                <span th:text="${topic.name}"></span><span th:if="${!iterStat.last}">, </span>
            </span>
        </p>

        <p>
            <strong>Date:</strong>
            <span th:text="${speech.date != null ? #temporals.format(speech.date, 'MMM dd, yyyy') : '—'}"></span>
        </p>

        <p th:text="${speech.content}" class="speech-content"></p>

        <div th:if="${speech.audioUrl != null and !#strings.isEmpty(speech.audioUrl)}">
            <p><strong>Audio:</strong></p>
            <audio controls style="width: 100%;">
                <source th:src="${speech.audioUrl}" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <br/>
        <a th:href="@{/}" class="btn btn-secondary">Back to Library</a>
    </div>
</div>

</body>
</html>
