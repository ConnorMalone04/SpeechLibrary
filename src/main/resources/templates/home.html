<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Speech Library</title>
</head>

<body>

    <div class="navbar">
        <h1 class="page-title">Speech Library</h1>

        <a th:href="@{/}" class="btn btn-secondary">Home</a>

        <span sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}" class="btn btn-secondary">Admin Dashboard</a>
        </span>

        <span sec:authorize="isAnonymous()">
            <a th:href="@{/login}" class="btn btn-primary">Login</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary">Logout</button>
            </form>
        </span>

        <div class="mb-20">
            <form th:action="@{/search}" method="get" class="search-bar">
                <input type="text"
                       name="query"
                       th:value="${query}"
                       placeholder="Search speeches, people, or topics..."
                       class="form-control search-input" />

                <input type="hidden" name="sortField" th:value="${sortField}" />
                <input type="hidden" name="sortDir" th:value="${sortDir}" />
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="size" th:value="${pageSize}" />

                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </div>

    <hr>

    <table class="table">
        <thead>
            <tr>
                <th>
                    <a th:if="${!isSearch}"
                       th:href="@{/(page=${currentPage}, size=${pageSize}, sortField='title', sortDir=${reverseSortDir})}">
                        Title
                        <span th:if="${sortField == 'title'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>

                    <a th:if="${isSearch}"
                       th:href="@{/search(query=${query}, page=${currentPage}, size=${pageSize}, sortField='title', sortDir=${reverseSortDir})}">
                        Title
                        <span th:if="${sortField == 'title'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>
                </th>

                <th>
                    <a th:if="${!isSearch}"
                       th:href="@{/(page=${currentPage}, size=${pageSize}, sortField='person', sortDir=${reverseSortDir})}">
                        Speaker
                        <span th:if="${sortField == 'person'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>

                    <a th:if="${isSearch}"
                       th:href="@{/search(query=${query}, page=${currentPage}, size=${pageSize}, sortField='person', sortDir=${reverseSortDir})}">
                        Speaker
                        <span th:if="${sortField == 'person'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>
                </th>

                <th>
                    <a th:if="${!isSearch}"
                       th:href="@{/(page=${currentPage}, size=${pageSize}, sortField='topic', sortDir=${reverseSortDir})}">
                        Topic
                        <span th:if="${sortField == 'topic'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>

                    <a th:if="${isSearch}"
                       th:href="@{/search(query=${query}, page=${currentPage}, size=${pageSize}, sortField='topic', sortDir=${reverseSortDir})}">
                        Topic
                        <span th:if="${sortField == 'topic'}"
                              th:text="${sortDir == 'asc'} ? ' â–˛' : ' â–Ľ'"></span>
                    </a>
                </th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="speech : ${speeches}">
                <td>
                    <a th:href="@{/speeches/{id}(id=${speech.id})}"
                       th:text="${speech.title}"></a>
                </td>
                <td th:text="${speech.person?.name ?: 'Unknown'}"></td>
                <td th:text="${speech.topic?.name ?: 'â€”'}"></td>
            </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${totalPages > 1}">
        <span th:if="${currentPage > 0}">
            <a th:if="${!isSearch}"
               th:href="@{/(page=${currentPage - 1}, size=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}"
               class="btn btn-secondary">Previous</a>

            <a th:if="${isSearch}"
               th:href="@{/search(query=${query}, page=${currentPage - 1}, size=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}"
               class="btn btn-secondary">Previous</a>
        </span>

        <span>
            Page <span th:text="${currentPage + 1}"></span>
            of <span th:text="${totalPages}"></span>
        </span>

        <span th:if="${currentPage + 1 < totalPages}">
            <a th:if="${!isSearch}"
               th:href="@{/(page=${currentPage + 1}, size=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}"
               class="btn btn-secondary">Next</a>

            <a th:if="${isSearch}"
               th:href="@{/search(query=${query}, page=${currentPage + 1}, size=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}"
               class="btn btn-secondary">Next</a>
        </span>
    </div>

</body>
</html>
