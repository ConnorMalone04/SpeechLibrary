<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage People</title>
</head>
<body>

<h1>People</h1>

<a th:href="@{/admin/people/new}">Create New Person</a>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Bio</th>
        <th>Actions</th>
    </tr>

    <tr th:each="person : ${people}">
        <td th:text="${person.name}"></td>
        <td th:text="${person.bio}"></td>
        <td>
            <a th:href="@{/admin/people/edit/{id}(id=${person.id})}">Edit</a>

            <form th:action="@{/admin/people/delete/{id}(id=${person.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit"
                        onclick="return confirm('Are you sure?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/admin}">Back to Dashboard</a>

</body>
</html>
