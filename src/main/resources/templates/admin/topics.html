<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Manage Topics</title>
</head>

<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>

    <span sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin}">Admin Dashboard</a>
    </span>

    <span sec:authorize="isAnonymous()">
        <a th:href="@{/login}">Login</a>
    </span>

    <span sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
    </span>
</div>

<div class="page">
    <div class="container">
        <div class="card">

            <h1 class="page-title">Topics</h1>

            <a th:href="@{/admin/topics/new}" class="btn btn-primary mb-20">
                Create New Topic
            </a>

            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="topic : ${topics}">
                        <td th:text="${topic.name}"></td>
                        <td>
                            <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}" class="btn btn-secondary">
                                Edit
                            </a>

                            <form th:action="@{/admin/topics/delete/{id}(id=${topic.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger"
                                        onclick="return confirm('Are you sure?');">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <a th:href="@{/admin}" class="btn btn-secondary mt-20">
                Back to Dashboard
            </a>

        </div>
    </div>
</div>

</body>
</html>
