<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users</title>
</head>
<body>

<h1>Users</h1>

<table border="1">
    <tr>
        <th>Username</th>
        <th>Role</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.username}"></td>
        <td th:text="${user.role}"></td>
    </tr>
</table>

<br>
<a th:href="@{/admin}">Back to Dashboard</a>

</body>
</html>
