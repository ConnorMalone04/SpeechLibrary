name: Spring CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build project
        run: ./mvnw clean package -DskipTests

      - name: Start app with testperf profile
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=testperf > app.log 2>&1 &
          echo $! > app.pid
          sleep 5
          cat app.log

      - name: Wait for app to start
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/; then
              echo "App is up"
              exit 0
            fi
      
            if ! ps -p $(cat app.pid) > /dev/null; then
              echo "App crashed"
              cat app.log
              exit 1
            fi
      
            sleep 2
          done
      
          echo "App failed to start"
          cat app.log
          exit 1

      - name: Run tests
        run: ./mvnw test

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi
