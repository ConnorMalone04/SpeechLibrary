name: Spring CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate test data
        run: NUM_SPEECHES=5000 python3 scripts/generate_test_data.py

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build project
        run: ./mvnw clean package -DskipTests

      
      - name: Start app with testperf profile
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=testperf > app.log 2>&1 &
          echo $! > app.pid
          sleep 5
          cat app.log

      - name: Wait for app to start
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/; then
              echo "App is up"
              exit 0
            fi
      
            if ! ps -p $(cat app.pid) > /dev/null; then
              echo "App crashed"
              cat app.log
              exit 1
            fi
      
            sleep 2
          done
      
          echo "App failed to start"
          cat app.log
          exit 1

      - name: Run tests
        run: ./mvnw test

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run staged load test
        run: k6 run perf/home.js

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi

  deploy:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: render

    steps:
      - name: Trigger Render Deploy
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deployment triggered successfully"
          else
            echo "Deployment failed with status $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
