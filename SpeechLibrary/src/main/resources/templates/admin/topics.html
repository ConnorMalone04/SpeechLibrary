<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Topics</title>
</head>
<body>

<h1>Topics</h1>

<a th:href="@{/admin/topics/new}">Create New Topic</a>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Actions</th>
    </tr>

    <tr th:each="topic : ${topics}">
        <td th:text="${topic.name}"></td>
        <td th:text="${topic.description}"></td>
        <td>
            <a th:href="@{/admin/topics/edit/{id}(id=${topic.id})}">Edit</a>

            <form th:action="@{/admin/topics/delete/{id}(id=${topic.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit"
                        onclick="return confirm('Are you sure?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/admin}">Back to Dashboard</a>

</body>
</html>
