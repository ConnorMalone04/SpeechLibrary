<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Person Form</title>
</head>
<body>

<h1 th:text="${person.id == null} ? 'Create Person' : 'Edit Person'"></h1>

<form th:action="@{/admin/people/save}"
      th:object="${person}"
      method="post">

    <input type="hidden" th:field="*{id}" />

    <div>
        <label>Name:</label>
        <input type="text" th:field="*{name}" />
        <div th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}"
             style="color:red"></div>
    </div>

    <div>
        <label>Bio:</label>
        <textarea th:field="*{bio}"></textarea>
    </div>

    <button type="submit">Save</button>
</form>

<br>
<a th:href="@{/admin/people}">Back</a>

</body>
</html>
