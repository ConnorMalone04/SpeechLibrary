<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Speeches</title>
</head>
<body>

<h1>Speeches</h1>

<a th:href="@{/admin/speeches/new}">Create New Speech</a>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Person</th>
        <th>Topic</th>
        <th>Actions</th>
    </tr>

    <tr th:each="speech : ${speeches}">
        <td th:text="${speech.title}"></td>
        <td th:text="${speech.person.name}"></td>
        <td th:text="${speech.topic.name}"></td>
        <td>
            <a th:href="@{/admin/speeches/edit/{id}(id=${speech.id})}">Edit</a>

            <form th:action="@{/admin/speeches/delete/{id}(id=${speech.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit"
                        onclick="return confirm('Are you sure?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>
</table>

<br>
<a th:href="@{/admin}">Back to Dashboard</a>

</body>
</html>
